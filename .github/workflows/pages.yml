# Inspired from https://github.com/actions/starter-workflows/blob/main/pages/nextjs.yml
name: GitHub Pages

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - id: configurepages
        uses: actions/configure-pages@v5
      - name: Resolve base path
        run: |
          if [ "${CUSTOM_DOMAIN:-false}" = "true" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          elif [ -n "${BASE_PATH_OVERRIDE:-}" ]; then
            echo "BASE_PATH=$BASE_PATH_OVERRIDE" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=$CONFIGURED_BASE_PATH" >> "$GITHUB_ENV"
          fi
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          BASE_PATH_OVERRIDE: ${{ vars.BASE_PATH }}
          CONFIGURED_BASE_PATH: ${{ steps.configurepages.outputs.base_path }}
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - run: npm ci
      - name: Verify notes sources
        run: |
          echo "Tracked notes files:"
          git ls-tree -r --name-only HEAD | grep '^data/notes/' | sort || true
          echo "Workspace notes files:"
          find data/notes -maxdepth 6 -type f -print | sort || true
      - run: npm run build
        env:
          EXPORT: 1
          UNOPTIMIZED: 1
          NEXT_PUBLIC_GISCUS_REPO: ${{ vars.NEXT_PUBLIC_GISCUS_REPO }}
          NEXT_PUBLIC_GISCUS_REPOSITORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_REPOSITORY_ID }}
          NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY }}
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.NEXT_PUBLIC_GISCUS_CATEGORY_ID }}
      - name: Verify exported notes
        run: |
          test -f app/notes/page.tsx
          test -f components/notes/NotesVaultClient.tsx
          test -f out/notes/index.html
          find out/notes -maxdepth 5 -type f | sort | sed -n '1,120p'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
