<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hitsuji">
  <style>
    :root {
      --accent: #4850a2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --accent: #aebaff;
      }
    }

    rect {
      fill: transparent;
    }

    text {
      fill: var(--accent);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK JP", "Noto Sans JP", sans-serif;
      font-size: 42px;
      font-weight: 700;
    }
  </style>
  <rect width="64" height="64" rx="14" />
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle">羊</text>
</svg>
